<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#1a1410" rx="4"/>
  <!-- Tower platforms (pixel blocks) -->
  <rect x="4" y="24" width="24" height="3" fill="#8BBF7A"/>
  <rect x="8" y="20" width="12" height="3" fill="#6A9AB0"/>
  <rect x="14" y="16" width="10" height="3" fill="#C070E0"/>
  <rect x="6" y="12" width="10" height="3" fill="#E08020"/>
  <rect x="12" y="8" width="12" height="3" fill="#C0B0E0"/>
  <!-- Spike platform (red) -->
  <rect x="8" y="4" width="8" height="2" fill="#CC0000"/>
  <rect x="9" y="2" width="1" height="2" fill="#FF3333"/>
  <rect x="12" y="2" width="1" height="2" fill="#FF3333"/>
  <rect x="15" y="2" width="1" height="2" fill="#FF3333"/>
  <!-- Little character on a platform -->
  <rect x="11" y="17" width="3" height="2" fill="#E8A87C"/>
  <rect x="12" y="15" width="2" height="2" fill="#F0C0A0"/>
  <!-- Eyes -->
  <rect x="12" y="15" width="1" height="1" fill="#222"/>
  <rect x="13" y="15" width="1" height="1" fill="#222"/>
</svg>
